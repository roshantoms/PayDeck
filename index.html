<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PayDeck – Copy UPI / Phone</title>
<link rel="icon" href="images/PayDeck_logo.png" type="image/png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="logo-modern">
    <img src="images/PayDeck_Title.png" alt="PayDeck Title" class="logo-img">
</div>
<input type="text" id="search" class="search" placeholder="Search contacts...">

<div class="container" id="list"></div>

<div class="fab" onclick="openModal()">+</div>

<!-- Add / Edit Contact Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h3 style="margin-bottom:10px">Add Contact</h3>
    <input id="name" placeholder="Name" autocomplete="off">
    <input id="upi" placeholder="UPI ID (e.g., name@okhdfcbank)" autocomplete="off">
    <input id="phone" placeholder="Phone Number (optional)" autocomplete="off">
    <input id="note" placeholder="Notes (optional)" autocomplete="off">
    <button class="pay" onclick="addContact()">Save</button>
  </div>
</div>

<script src="script.js"></script>

<p class="note">📋 Tap "Copy UPI" or "Copy Phone" – then paste into any UPI app or dialer.</p>

</body>
</html>
