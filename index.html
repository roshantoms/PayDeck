<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>PayDeck</title>
<link rel="icon" href="images/PayDeck_logo.png" type="image/png">
<link rel="stylesheet" href="style.css">
<!-- QR Code library (for optional QR generation) -->
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="logo-modern">
    <img src="images/PayDeck_Title.png" alt="PayDeck Title" class="logo-img">
</div>
<input type="text" id="search" class="search" placeholder="Search contacts...">

<div class="container" id="list"></div>

<div class="fab" onclick="openModal()">+</div>

<!-- Add Contact Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <h3 style="margin-bottom:10px">Add Contact</h3>
    <input id="name" placeholder="Name" autocomplete="off">
    <input id="upi" placeholder="UPI ID (e.g., name@okhdfcbank)" autocomplete="off">
    <input id="note" placeholder="Notes (optional)" autocomplete="off">
    <button class="pay" onclick="addContact()">Save</button>
  </div>
</div>

<!-- QR Code Modal (optional) -->
<div class="modal" id="qrModal">
  <div class="modal-content" style="text-align: center;">
    <button class="close-btn" onclick="closeQRModal()">✕</button>
    <h3 style="margin-bottom:10px">Scan QR with any UPI App</h3>
    <div id="qrcode" style="display: flex; justify-content: center; margin: 20px 0;"></div>
    <p style="font-size: 0.8rem; opacity: 0.7;">Ask the other person to scan this QR with their UPI app.</p>
    <button class="pay" onclick="closeQRModal()" style="margin-top: 10px;">Done</button>
  </div>
</div>

<script src="script.js"></script>

<p class="note">💡 Tap "Pay" → enter amount → your UPI app opens (amount will be asked again there). If it fails, use "Copy Link".</p>

</body>
</html>
